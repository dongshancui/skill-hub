<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>设计文档图标</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0f2f5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

.icon-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  width: 220px;
}

/* document stack */
.stack {
  position: relative;
  width: 160px;
  height: 180px;
}

.doc {
  position: absolute;
  width: 140px;
  height: 170px;
  background: #fff;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  box-shadow: 0 3px 12px rgba(0,0,0,.1);
  display: flex;
  flex-direction: column;
  padding: 18px 16px 14px;
  gap: 8px;
}
.doc::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 26px; height: 26px;
  border-left: 2px solid;
  border-bottom: 2px solid;
  border-radius: 0 10px 0 10px;
}

.doc-3 {
  left: 20px; top: 18px;
  background: #fffbf0;
  border-color: #fcd34d;
  transform: rotate(7deg);
  z-index: 1;
}
.doc-3::after { background: #fef3c7; border-color: #fcd34d; }

.doc-2 {
  left: 10px; top: 9px;
  background: #f0f9ff;
  border-color: #7dd3fc;
  transform: rotate(3deg);
  z-index: 2;
}
.doc-2::after { background: #e0f2fe; border-color: #7dd3fc; }

.doc-1 {
  left: 0; top: 0;
  background: #fff;
  border-color: #cbd5e1;
  z-index: 3;
}
.doc-1::after { background: #f1f5f9; border-color: #cbd5e1; }

.line {
  height: 6px;
  border-radius: 3px;
}
.doc-1 .line { background: #e2e8f0; }
.doc-2 .line { background: #bae6fd; }
.doc-3 .line { background: #fde68a; }

.line.w100 { width: 100%; }
.line.w80  { width: 80%; }
.line.w60  { width: 60%; }
.line.w90  { width: 90%; }
.line.w70  { width: 70%; }

.ext {
  position: absolute;
  bottom: 12px; right: 12px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'Menlo', 'Consolas', monospace;
  padding: 2px 7px;
  border-radius: 4px;
}
.doc-1 .ext { background: #dcfce7; color: #15803d; }
.doc-2 .ext { background: #e0f2fe; color: #0284c7; }
.doc-3 .ext { background: #fef9c3; color: #a16207; }

/* label */
.label {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: 100%;
}
.label-main {
  font-size: 1.6rem;
  font-weight: 800;
  color: #1e293b;
  letter-spacing: -.02em;
}
.label-files {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 100%;
}
.label-file {
  font-size: .68rem;
  color: #94a3b8;
  font-weight: 500;
  font-family: 'Menlo', 'Consolas', monospace;
}
</style>
</head>
<body>
<div class="icon-wrap">

  <div class="stack">
    <div class="doc doc-3">
      <div class="line w80"></div>
      <div class="line w100"></div>
      <div class="line w60"></div>
      <div class="line w90"></div>
      <div class="line w70"></div>
      <span class="ext">.sql</span>
    </div>
    <div class="doc doc-2">
      <div class="line w90"></div>
      <div class="line w70"></div>
      <div class="line w100"></div>
      <div class="line w80"></div>
      <div class="line w60"></div>
      <span class="ext">.yaml</span>
    </div>
    <div class="doc doc-1">
      <div class="line w100"></div>
      <div class="line w80"></div>
      <div class="line w100"></div>
      <div class="line w60"></div>
      <div class="line w90"></div>
      <span class="ext">.md</span>
    </div>
  </div>

  <div class="label">
    <div class="label-main">设计文档</div>
    <div class="label-files">
      <span class="label-file">design_document.md</span>
      <span class="label-file">design_api.yaml</span>
      <span class="label-file">design_db.sql</span>
    </div>
  </div>

</div>
</body>
</html>
